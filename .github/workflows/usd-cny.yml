name: Send USD CNY Rate To Feishu

on:
  schedule:
    # 北京时间 09:30 = UTC 01:30
    - cron: "30 1 * * *"
  workflow_dispatch:

jobs:
  send-rate:
    runs-on: ubuntu-latest

    steps:
      - name: Send USD/CNY rate
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys
          import urllib.request
          from datetime import datetime, timezone, timedelta
          from email.utils import parsedate_to_datetime

          webhook = os.environ["FEISHU_WEBHOOK"]
          rate_url = "https://open.er-api.com/v6/latest/USD"

          with urllib.request.urlopen(rate_url, timeout=20) as response:
              data = json.loads(response.read().decode("utf-8"))

          cny = data["rates"]["CNY"]
          update_utc_raw = data.get("time_last_update_utc", "")

          cn_tz = timezone(timedelta(hours=8))
          now_cn = datetime.now(timezone.utc).astimezone(cn_tz).strftime("%Y-%m-%d %H:%M:%S")

          try:
              update_cn = parsedate_to_datetime(update_utc_raw).astimezone(cn_tz).strftime("%Y-%m-%d %H:%M:%S")
          except Exception:
              update_cn = update_utc_raw or "未知"

          card = {
              "config": {
                  "wide_screen_mode": True
              },
              "header": {
                  "template": "blue",
                  "title": {
                      "tag": "plain_text",
                      "content": "美元汇率日报"
                  }
              },
              "elements": [
                  {
                      "tag": "div",
                      "text": {
                          "tag": "lark_md",
                          "content": f"**今日 USD/CNY 参考汇率**\n\n**USD/CNY：{cny:.4f}**"
                      }
                  },
                  {
                      "tag": "hr"
                  },
                  {
                      "tag": "div",
                      "fields": [
                          {
                              "is_short": True,
                              "text": {
                                  "tag": "lark_md",
                                  "content": f"**1 美元约等于**\n{cny:.4f} 人民币"
                              }
                          },
                          {
                              "is_short": True,
                              "text": {
                                  "tag": "lark_md",
                                  "content": f"**100 美元约等于**\n{cny * 100:.2f} 人民币"
                              }
                          },
                          {
                              "is_short": True,
                              "text": {
                                  "tag": "lark_md",
                                  "content": f"**发送时间**\n{now_cn}"
                              }
                          },
                          {
                              "is_short": True,
                              "text": {
                                  "tag": "lark_md",
                                  "content": f"**数据更新时间**\n{update_cn}"
                              }
                          }
                      ]
                  },
                  {
                      "tag": "note",
                      "elements": [
                          {
                              "tag": "plain_text",
                              "content": "数据来源：ExchangeRate-API，仅供日常参考。"
                          }
                      ]
                  }
              ]
          }

          payload = {
              "msg_type": "interactive",
              "card": card
          }

          req = urllib.request.Request(
              url=webhook,
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )

          with urllib.request.urlopen(req, timeout=20) as response:
              result_text = response.read().decode("utf-8")
              print(result_text)

          try:
              result = json.loads(result_text)
              if result.get("code") not in (0, None):
                  sys.exit(1)
          except json.JSONDecodeError:
              pass
          PY
