name: Send USD CNY Rate To Feishu

on:
  schedule:
    # 北京时间 09:30 = UTC 01:30
    - cron: "30 1 * * *"
  workflow_dispatch:

jobs:
  send-rate:
    runs-on: ubuntu-latest

    steps:
      - name: Send USD/CNY rate
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys
          import urllib.request
          from datetime import datetime, timezone, timedelta

          webhook = os.environ["FEISHU_WEBHOOK"]

          cn_tz = timezone(timedelta(hours=8))
          now_cn_dt = datetime.now(timezone.utc).astimezone(cn_tz)

          def fetch_json(url):
              with urllib.request.urlopen(url, timeout=20) as response:
                  return json.loads(response.read().decode("utf-8"))

          def make_line_chart(items, rows=5, width=28):
              if not items:
                  return "暂无走势数据"

              if len(items) > width:
                  step = len(items) / width
                  items = [items[int(i * step)] for i in range(width)]

              dates = [d for d, _ in items]
              values = [v for _, v in items]
              low = min(values)
              high = max(values)

              if high == low:
                  high = low + 0.0001

              grid = [[" " for _ in values] for _ in range(rows)]

              points = []
              for value in values:
                  y = round((high - value) / (high - low) * (rows - 1))
                  points.append(y)

              for x, y in enumerate(points):
                  grid[y][x] = "─"

              for x in range(len(points) - 1):
                  y1 = points[x]
                  y2 = points[x + 1]

                  if y1 == y2:
                      grid[y1][x] = "─"
                      grid[y1][x + 1] = "─"
                  elif y2 < y1:
                      grid[y1][x] = "╰"
                      grid[y2][x + 1] = "╭"
                      for y in range(y2 + 1, y1):
                          grid[y][x + 1] = "│"
                  else:
                      grid[y1][x] = "╭"
                      grid[y2][x + 1] = "╰"
                      for y in range(y1 + 1, y2):
                          grid[y][x + 1] = "│"

              lines = []
              for r in range(rows):
                  level = high - (high - low) * r / (rows - 1)
                  lines.append(f"{level:4.2f} ┤{''.join(grid[r])}")

              start_label = dates[0][5:]
              end_label = dates[-1][5:]
              axis_space = " " * max(2, width - len(start_label) - len(end_label))
              axis = f"     {start_label}{axis_space}{end_label}"

              return "\n".join(lines + [axis])

          current_data = fetch_json("https://open.er-api.com/v6/latest/USD")
          cny = current_data["rates"]["CNY"]

          end_date = now_cn_dt.date()
          start_date = end_date - timedelta(days=45)

          trend_url = (
              "https://api.frankfurter.app/"
              f"{start_date.isoformat()}..{end_date.isoformat()}"
              "?from=USD&to=CNY"
          )

          trend_summary = "暂无走势数据"
          chart = "暂无走势数据"
          range_text = "暂无区间数据"

          try:
              trend_data = fetch_json(trend_url)
              rates = trend_data.get("rates", {})
              items = sorted(
                  (date, value["CNY"])
                  for date, value in rates.items()
                  if "CNY" in value
              )
              items = items[-30:]

              if items:
                  values = [v for _, v in items]
                  first = values[0]
                  last = values[-1]
                  change = last - first
                  change_pct = change / first * 100 if first else 0

                  direction = "上行" if change > 0 else "下行" if change < 0 else "持平"
                  sign = "+" if change > 0 else ""

                  trend_summary = f"近 {len(items)} 个交易日：{direction} {sign}{change:.4f} ({sign}{change_pct:.2f}%)"
                  range_text = f"区间：{min(values):.4f} - {max(values):.4f}"
                  chart = make_line_chart(items)

          except Exception as error:
              trend_summary = f"走势获取失败：{error}"
              chart = "暂无走势数据"
              range_text = "暂无区间数据"

          card = {
              "config": {
                  "wide_screen_mode": True
              },
              "header": {
                  "template": "blue",
                  "title": {
                      "tag": "plain_text",
                      "content": "美元汇率日报"
                  }
              },
              "elements": [
                  {
                      "tag": "div",
                      "text": {
                          "tag": "lark_md",
                          "content": f"**USD/CNY**   **{cny:.4f}**"
                      }
                  },
                  {
                      "tag": "div",
                      "text": {
                          "tag": "lark_md",
                          "content": f"**近30个交易日 USD/CNY**\n```text\n{chart}\n```"
                      }
                  },
                  {
                      "tag": "div",
                      "text": {
                          "tag": "lark_md",
                          "content": f"{trend_summary}\n{range_text}"
                      }
                  },
                  {
                      "tag": "note",
                      "elements": [
                          {
                              "tag": "plain_text",
                              "content": "数据来源：ExchangeRate-API / Frankfurter，仅供日常参考。"
                          }
                      ]
                  }
              ]
          }

          payload = {
              "msg_type": "interactive",
              "card": card
          }

          req = urllib.request.Request(
              url=webhook,
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )

          with urllib.request.urlopen(req, timeout=20) as response:
              result_text = response.read().decode("utf-8")
              print(result_text)

          try:
              result = json.loads(result_text)
              if result.get("code") not in (0, None):
                  sys.exit(1)
          except json.JSONDecodeError:
              pass
          PY
